<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
padding:20px;
}

.card{
width:100%;
max-width:400px;
background:#111827;
padding:30px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.4);
text-align:center;
}

.lock{
font-size:60px;
margin-bottom:15px;
}

h1{
color:white;
margin-bottom:10px;
}

p{
color:#9ca3af;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:10px;
background:#1f2937;
color:white;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#facc15;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.error{
background:#7f1d1d;
color:white;
padding:10px;
border-radius:10px;
margin-bottom:15px;
}
</style>
</head>

<body>

<div class="card">

<div class="lock">🔒</div>

<h1>Admin Login</h1>

<p>Enter dashboard password</p>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form method="POST">

<input
type="password"
name="password"
placeholder="Enter Password"
required
>

<button type="submit">
Login Dashboard
</button>

</form>

</div>

</body>
</html>
